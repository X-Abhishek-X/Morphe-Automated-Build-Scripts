name: Check for ReVanced Updates (YouTube)

on:
  schedule:
    - cron: "0 1 * * *" # Run daily at 1 AM (separate from Photos)
  workflow_dispatch:

jobs:
  check-youtube:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Install apkeep (python script)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/install_apkeep.py
          chmod +x apkeep
          sudo mv apkeep /usr/local/bin/
          apkeep --version

      - name: Run update script (Check versions)
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_CLEANUP: "true"
        run: python scripts/check_updates.py

      - name: Set build date
        id: date
        run: echo "today=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT

      - name: Download YouTube APK
        if: steps.check.outputs.youtube_version != ''
        run: |
          VERSION="${{ steps.check.outputs.youtube_version }}"
          echo "Expected version: $VERSION"
          if [ "$VERSION" = "latest" ]; then
            echo "Downloading latest version..."
            apkeep -a com.google.android.youtube .
          else
            echo "Downloading version $VERSION..."
            apkeep -a "com.google.android.youtube@${VERSION}" .
          fi

      - name: Patch YouTube
        if: steps.check.outputs.youtube_version != ''
        run: |
          echo "Current directory contents:"
          ls -la

          # Find the downloaded file (could be .apk, .xapk, or .apks)
          APK_FILE=$(find . -maxdepth 1 \( -name "com.google.android.youtube*.apk" -o -name "com.google.android.youtube*.xapk" -o -name "com.google.android.youtube*.apks" \) | head -n 1)

          if [ -z "$APK_FILE" ]; then
             echo "APK not found! Listing files:"
             ls -la
             exit 1
          fi

          echo "Found file: $APK_FILE"

          # Handle XAPK/APKS (Split APKs) which apkeep downloads from Play Store
          if [[ "$APK_FILE" == *.xapk ]] || [[ "$APK_FILE" == *.apks ]]; then
            echo "Split APK bundle detected. Extracting..."
            unzip -o "$APK_FILE" -d extracted_apk
            echo "Extracted contents:"; ls extracted_apk/

            # Get the main APK (base.apk or package-named .apk — not a config split)
            MAIN_APK=$(find extracted_apk -maxdepth 1 -name "base.apk" | head -n 1)
            if [ -z "$MAIN_APK" ]; then
              MAIN_APK=$(find extracted_apk -maxdepth 1 -name "*.apk" ! -name "config.*" | head -n 1)
            fi
            echo "Main APK: $MAIN_APK ($(du -sh "$MAIN_APK" | cut -f1))"

            # Copy main APK as the working file
            cp "$MAIN_APK" merged.apk

            # Inject ARM64 native libraries directly into the APK using zip.
            # APKEditor silently drops the native .so files, so we do this manually.
            ARM64_CONFIG=$(find extracted_apk -maxdepth 1 -name "config.arm64_v8a.apk" | head -n 1)
            if [ -n "$ARM64_CONFIG" ]; then
              echo "Injecting ARM64 native libs from: $ARM64_CONFIG"
              mkdir -p arm64_libs_tmp
              unzip -o "$ARM64_CONFIG" "lib/*" -d arm64_libs_tmp/ 2>/dev/null || true
              if [ -d "arm64_libs_tmp/lib" ]; then
                cd arm64_libs_tmp && zip -r ../merged.apk lib/ && cd ..
                echo "ARM64 native libs injected."
              else
                echo "No lib/ directory found in ARM64 config split."
              fi
            else
              echo "WARNING: No config.arm64_v8a.apk found. APK will lack ARM64 native code."
            fi

            echo "Final merged APK size: $(du -sh merged.apk | cut -f1)"
            APK_FILE="merged.apk"
          fi

          CLI_JAR=$(find . -name "revanced-cli-*.jar" | head -n 1)
          PATCHES_RVP=$(find . -name "patches-*.rvp" | head -n 1)

          echo "CLI JAR: $CLI_JAR"
          echo "Patches RVP: $PATCHES_RVP"
          echo "Patching $APK_FILE..."

          # Note: No --keystore flag — ReVanced CLI will auto-generate one
          java -jar "$CLI_JAR" patch \
            --exclusive \
            -p "$PATCHES_RVP" \
            -e "Bypass URL redirects" \
            -e "Bypass image region restrictions" \
            -e "Change form factor" \
            -e "Check watch history domain name resolution" \
            -e "Copy video URL" \
            -e "Custom player overlay opacity" \
            -e "Disable auto captions" \
            -e "Disable double tap actions" \
            -e "Disable fullscreen ambient mode" \
            -e "Disable haptic feedback" \
            -e "Disable player popup panels" \
            -e "Disable resuming Shorts on startup" \
            -e "Disable rolling number animations" \
            -e "Disable sign in to TV popup" \
            -e "Disable video codecs" \
            -e "Downloads" \
            -e "Exit fullscreen mode" \
            -e "Force original audio" \
            -e "GmsCore support" \
            -e "Hide Shorts components" \
            -e "Hide ads" \
            -e "Hide end screen cards" \
            -e "Hide end screen suggested video" \
            -e "Hide info cards" \
            -e "Hide layout components" \
            -e "Hide player flyout menu items" \
            -e "Hide player overlay buttons" \
            -e "Hide related video overlay" \
            -e "Hide timestamp" \
            -e "Hide video action buttons" \
            -e "Loop video" \
            -e "Miniplayer" \
            -e "Navigation buttons" \
            -e "Open Shorts in regular player" \
            -e "Open links externally" \
            -e "Open videos fullscreen" \
            -e "Playback speed" \
            -e "Remove background playback restrictions" \
            -e "Remove viewer discretion dialog" \
            -e "Return YouTube Dislike" \
            -e "Sanitize sharing links" \
            -e "Seekbar" \
            -e "Shorts autoplay" \
            -e "SponsorBlock" \
            -e "Spoof app version" \
            -e "Spoof device dimensions" \
            -e "Spoof video streams" \
            -e "Swipe controls" \
            -e "Theme" \
            -e "Video ads" \
            -e "Video quality" \
            -e "Wide search bar" \
            -o "youtube-revanced-v${{ steps.check.outputs.youtube_version }}-${{ steps.date.outputs.today }}.apk" \
            "$APK_FILE"

      - name: Upload YouTube ReVanced
        if: steps.check.outputs.youtube_version != ''
        uses: actions/upload-artifact@v4
        with:
          name: "youtube-revanced-v${{ steps.check.outputs.youtube_version }}-${{ steps.date.outputs.today }}"
          path: "youtube-revanced-v${{ steps.check.outputs.youtube_version }}-${{ steps.date.outputs.today }}.apk"
          retention-days: 90

      - name: Create Release
        if: steps.check.outputs.youtube_version != ''
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "youtube-revanced-v${{ steps.check.outputs.youtube_version }}-${{ steps.date.outputs.today }}"
          name: "YouTube ReVanced v${{ steps.check.outputs.youtube_version }} (${{ steps.date.outputs.today }})"
          body: |
            Automated daily build of YouTube ReVanced.

            **App Version:** ${{ steps.check.outputs.youtube_version }}
            **Build Date:** ${{ steps.date.outputs.today }}

            *Signed by Google (verified).*
          files: "youtube-revanced-v${{ steps.check.outputs.youtube_version }}-${{ steps.date.outputs.today }}.apk"
          draft: false
          prerelease: false
