name: Check for ReVanced Updates

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  check-updates:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Install apkeep (python script)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/install_apkeep.py
          chmod +x apkeep
          sudo mv apkeep /usr/local/bin/
          apkeep --version

      - name: Run update script
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_CLEANUP: "true"
        run: python scripts/check_updates.py

      - name: Download Google Photos APK
        if: steps.check.outputs.photos_version != ''
        id: download
        run: |
          sudo apt-get update && sudo apt-get install -y aapt

          VERSION="${{ steps.check.outputs.photos_version }}"
          echo "Expected version: $VERSION"
          if [ "$VERSION" = "latest" ]; then
            echo "Downloading latest version..."
            apkeep -a com.google.android.apps.photos .
          else
            echo "Downloading version $VERSION..."
            apkeep -a "com.google.android.apps.photos@${VERSION}" .
          fi

          echo "Directory contents after download:"
          ls -la

          # Find whatever apkeep downloaded (.apk, .xapk, or .apks)
          DOWNLOAD=$(find . -maxdepth 1 \( -name "com.google.android.apps.photos*.apk" -o -name "com.google.android.apps.photos*.xapk" -o -name "com.google.android.apps.photos*.apks" \) | head -n 1)

          if [ -z "$DOWNLOAD" ]; then
            echo "ERROR: Could not find any downloaded Google Photos file!"
            ls -la
            exit 1
          fi

          echo "Found downloaded file: $DOWNLOAD"

          # If it's a split APK (XAPK/APKS), extract and merge first
          if [[ "$DOWNLOAD" == *.xapk ]] || [[ "$DOWNLOAD" == *.apks ]]; then
            echo "Detected Split APK bundle. Extracting and merging..."
            unzip -o "$DOWNLOAD" -d extracted_photos

            # Download APKEditor to merge splits
            APKEDITOR_URL=$(curl -s https://api.github.com/repos/REAndroid/APKEditor/releases/latest | grep "browser_download_url.*jar" | cut -d '"' -f 4 | head -n 1)
            curl -L -o APKEditor.jar "$APKEDITOR_URL"
            java -jar APKEditor.jar m -i extracted_photos -o photos_merged.apk

            if [ ! -f "photos_merged.apk" ]; then
              echo "Error: Failed to merge APKs."
              exit 1
            fi

            DOWNLOAD="photos_merged.apk"
            echo "Merged into: $DOWNLOAD"
          fi

          # Extract real version using aapt (works on regular APKs)
          REAL_VERSION=$(aapt dump badging "$DOWNLOAD" | grep "versionName" | sed -e "s/.*versionName='//" -e "s/'.*//")
          echo "Detected Real Version: $REAL_VERSION"

          if [ -z "$REAL_VERSION" ]; then
            echo "ERROR: Could not extract version from APK!"
            exit 1
          fi

          # Set step output
          echo "photos_version=$REAL_VERSION" >> $GITHUB_OUTPUT

          # Rename for consistent naming downstream
          mv "$DOWNLOAD" "com.google.android.apps.photos-${REAL_VERSION}.apk"
          echo "apk_path=com.google.android.apps.photos-${REAL_VERSION}.apk" >> $GITHUB_OUTPUT

      - name: Verify APK Signature
        if: steps.check.outputs.photos_version != ''
        run: |
          echo "Verifying APK signature..."
          APK_FILE=$(find . -name "com.google.android.apps.photos*.apk" | head -n 1)
          echo "Checking: $APK_FILE"

          # Try apksigner first (more reliable on modern APK formats)
          if command -v apksigner &> /dev/null; then
            FINGERPRINT=$(apksigner verify --print-certs "$APK_FILE" | grep "Signer #1 certificate SHA-256 digest:" | awk '{print $NF}' | tr '[:lower:]' '[:upper:]' | sed 's/../&:/g;s/:$//')
          else
            # Fallback to keytool
            FINGERPRINT=$(keytool -printcert -jarfile "$APK_FILE" 2>/dev/null | grep "SHA256:" | head -n 1 | awk '{print $2}')
          fi

          echo "APK Fingerprint: $FINGERPRINT"

          # Known Google Photos Release Certificate Fingerprint (SHA-256)
          EXPECTED_HASH="3D:7A:12:23:01:9A:A3:9D:9E:A0:E3:43:6A:B7:C0:89:6B:FB:4F:B6:79:F4:DE:5F:E7:C2:3F:32:6C:8F:99:4A"

          if [ -z "$FINGERPRINT" ]; then
            echo "WARNING: Could not extract fingerprint. Skipping verification (apkeep downloads from Play Store so this is likely safe)."
          elif [ "$FINGERPRINT" != "$EXPECTED_HASH" ]; then
             echo "ERROR: Signature verification failed!"
             echo "Expected: $EXPECTED_HASH"
             echo "Found:    $FINGERPRINT"
             echo "This APK might be modified or signed with a different key. Aborting."
             exit 1
          else
            echo "Signature verified! This APK is genuine and signed by Google."
          fi

      - name: Patch Google Photos
        if: steps.check.outputs.photos_version != ''
        run: |
          APK_FILE=$(find . -name "com.google.android.apps.photos*.apk" | head -n 1)
          if [ -z "$APK_FILE" ]; then
             echo "APK not found!"
             exit 1
          fi

          CLI_JAR=$(find . -name "revanced-cli-*.jar" | head -n 1)
          PATCHES_RVP=$(find . -name "patches-*.rvp" | head -n 1)

          echo "CLI JAR: $CLI_JAR"
          echo "Patches RVP: $PATCHES_RVP"
          echo "Patching $APK_FILE..."

          # Note: No --keystore flag — ReVanced CLI will auto-generate one
          java -jar "$CLI_JAR" patch \
            --exclusive \
            -p "$PATCHES_RVP" \
            -e "Spoof features" \
            -e "Enable DCIM folders backup control" \
            -e "GmsCore support" \
            -e "Change package name" \
            -o "google-photos-revanced-v${{ steps.download.outputs.photos_version }}.apk" \
            "$APK_FILE"

      - name: Upload Patched APK
        if: steps.check.outputs.photos_version != ''
        uses: actions/upload-artifact@v4
        with:
          name: "google-photos-revanced-v${{ steps.download.outputs.photos_version }}"
          path: "google-photos-revanced-v${{ steps.download.outputs.photos_version }}.apk"
          retention-days: 90

      - name: Create Release
        if: steps.check.outputs.photos_version != ''
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "google-photos-v${{ steps.download.outputs.photos_version }}"
          name: "Google Photos v${{ steps.download.outputs.photos_version }}"
          body: |
            Automated build of Google Photos ReVanced.

            **Version:** ${{ steps.download.outputs.photos_version }}

            *Signed by Google (verified).*
          files: "google-photos-revanced-v${{ steps.download.outputs.photos_version }}.apk"
          draft: false
          prerelease: false

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update ReVanced versions [skip ci]"
          branch: master
          file_pattern: "README.md"
