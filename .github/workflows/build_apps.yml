name: Build ReVanced Apps (YouTube, Google Photos & Reddit)

on:
  schedule:
    - cron: "0 2 * * *" # Run daily at 2 AM UTC — check for new supported versions
  workflow_dispatch: # Allow manual trigger at any time

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Check if any app has a newly supported version
  # ─────────────────────────────────────────────────────────────
  check-versions:
    name: "🔍 Check for new supported versions"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      needs_build: ${{ steps.check.outputs.needs_build }}
      youtube_version: ${{ steps.check.outputs.youtube_version }}
      photos_version: ${{ steps.check.outputs.photos_version }}
      reddit_version: ${{ steps.check.outputs.reddit_version }}
      patches_tag: ${{ steps.check.outputs.patches_tag }}
      cli_tag: ${{ steps.check.outputs.cli_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt bs4 requests

      - name: Run version check script
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_CLEANUP: "true"
        run: python scripts/check_updates.py

      - name: Show detected versions
        run: |
          echo "needs_build:     ${{ steps.check.outputs.needs_build }}"
          echo "youtube_version: ${{ steps.check.outputs.youtube_version }}"
          echo "photos_version:  ${{ steps.check.outputs.photos_version }}"
          echo "reddit_version:  ${{ steps.check.outputs.reddit_version }}"
          echo "patches_tag:     ${{ steps.check.outputs.patches_tag }}"

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Build and release — only runs when versions changed
  # ─────────────────────────────────────────────────────────────
  build-and-release:
    name: "🔨 Build & Release ReVanced Apps"
    needs: check-versions
    if: needs.check-versions.outputs.needs_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt bs4 requests

      - name: Install aapt (for version extraction)
        run: sudo apt-get update && sudo apt-get install -y aapt

      - name: Install apkeep (clean APK downloader fallback)
        run: |
          wget -qO apkeep https://github.com/EFForg/apkeep/releases/latest/download/apkeep-x86_64-unknown-linux-gnu
          chmod +x apkeep
          sudo mv apkeep /usr/local/bin/

      # Re-run check script to download CLI tools (SKIP_CLEANUP=true keeps the jar/rvp)
      - name: Download ReVanced CLI & Patches
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_CLEANUP: "true"
        run: |
          python scripts/check_updates.py
          echo "CLI jar: $(find . -name 'revanced-cli-*.jar' | head -1)"
          echo "Patches rvp: $(find . -name 'patches-*.rvp' | head -1)"

      - name: Set build date
        id: date
        run: echo "today=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT

      # ─── YOUTUBE ────────────────────────────────────────────────
      - name: Download YouTube APK
        if: needs.check-versions.outputs.youtube_version != ''
        id: dl_youtube
        run: |
          VERSION="${{ needs.check-versions.outputs.youtube_version }}"
          echo "Downloading YouTube $VERSION from Uptodown..."
          python scripts/download_uptodown.py "youtube" "$VERSION"
          if [ ! -f "com.google.android.youtube.apk" ]; then
            echo "❌ YouTube APK download failed!"
            exit 1
          fi
          echo "✅ YouTube APK downloaded."

      - name: Patch YouTube
        if: needs.check-versions.outputs.youtube_version != ''
        run: |
          APK_FILE="com.google.android.youtube.apk"
          CLI_JAR=$(find . -name "revanced-cli-*.jar" | head -n 1)
          PATCHES_RVP=$(find . -name "patches-*.rvp"  | head -n 1)
          VERSION="${{ needs.check-versions.outputs.youtube_version }}"
          TODAY="${{ steps.date.outputs.today }}"
          OUTPUT="youtube-revanced-v${VERSION}-${TODAY}.apk"

          echo "Patching YouTube $VERSION → $OUTPUT"
          java -jar "$CLI_JAR" patch \
            --keystore="revanced.keystore" \
            --exclusive \
            -p "$PATCHES_RVP" \
            -e "Bypass URL redirects" \
            -e "Bypass image region restrictions" \
            -e "Change form factor" \
            -e "Check watch history domain name resolution" \
            -e "Copy video URL" \
            -e "Custom player overlay opacity" \
            -e "Disable auto captions" \
            -e "Disable double tap actions" \
            -e "Disable fullscreen ambient mode" \
            -e "Disable haptic feedback" \
            -e "Disable player popup panels" \
            -e "Disable resuming Shorts on startup" \
            -e "Disable rolling number animations" \
            -e "Disable sign in to TV popup" \
            -e "Disable video codecs" \
            -e "Downloads" \
            -e "Exit fullscreen mode" \
            -e "Force original audio" \
            -e "GmsCore support" \
            -e "Hide Shorts components" \
            -e "Hide ads" \
            -e "Hide end screen cards" \
            -e "Hide end screen suggested video" \
            -e "Hide info cards" \
            -e "Hide layout components" \
            -e "Hide player flyout menu items" \
            -e "Hide player overlay buttons" \
            -e "Hide related video overlay" \
            -e "Hide timestamp" \
            -e "Hide video action buttons" \
            -e "Loop video" \
            -e "Miniplayer" \
            -e "Navigation buttons" \
            -e "Open Shorts in regular player" \
            -e "Open links externally" \
            -e "Open videos fullscreen" \
            -e "Playback speed" \
            -e "Remove background playback restrictions" \
            -e "Remove viewer discretion dialog" \
            -e "Return YouTube Dislike" \
            -e "Sanitize sharing links" \
            -e "Seekbar" \
            -e "Shorts autoplay" \
            -e "SponsorBlock" \
            -e "Spoof app version" \
            -e "Spoof device dimensions" \
            -e "Spoof video streams" \
            -e "Swipe controls" \
            -e "Theme" \
            -e "Video ads" \
            -e "Video quality" \
            -e "Wide search bar" \
            -o "$OUTPUT" \
            "$APK_FILE"
          echo "yt_output=$OUTPUT" >> $GITHUB_OUTPUT

      # ─── GOOGLE PHOTOS ──────────────────────────────────────────
      - name: Download Google Photos APK
        if: needs.check-versions.outputs.photos_version != ''
        id: dl_photos
        run: |
          VERSION="${{ needs.check-versions.outputs.photos_version }}"
          echo "Downloading Google Photos ${VERSION} from Uptodown..."
          python scripts/download_uptodown.py "google-photos" "$VERSION"
          if [ ! -f "com.google.android.apps.photos.apk" ]; then
            echo "❌ Google Photos APK download failed!"
            exit 1
          fi
          REAL_VERSION=$(aapt dump badging "com.google.android.apps.photos.apk" \
            | grep "versionName" | sed -e "s/.*versionName='//" -e "s/'.*//")
          echo "photos_real_version=$REAL_VERSION" >> $GITHUB_OUTPUT
          echo "✅ Google Photos APK downloaded (real version: $REAL_VERSION)."

      - name: Patch Google Photos
        if: needs.check-versions.outputs.photos_version != ''
        id: patch_photos
        run: |
          APK_FILE="com.google.android.apps.photos.apk"
          CLI_JAR=$(find . -name "revanced-cli-*.jar" | head -n 1)
          PATCHES_RVP=$(find . -name "patches-*.rvp"  | head -n 1)
          REAL_VERSION="${{ steps.dl_photos.outputs.photos_real_version }}"
          TODAY="${{ steps.date.outputs.today }}"
          OUTPUT="google-photos-revanced-v${REAL_VERSION}-${TODAY}.apk"

          echo "Patching Google Photos $REAL_VERSION → $OUTPUT"
          java -jar "$CLI_JAR" patch \
            --keystore="revanced.keystore" \
            --exclusive \
            -p "$PATCHES_RVP" \
            -e "Spoof features" \
            -e "Enable DCIM folders backup control" \
            -e "GmsCore support" \
            -e "Change package name" \
            -o "$OUTPUT" \
            "$APK_FILE"
          echo "photos_output=$OUTPUT" >> $GITHUB_OUTPUT

      # ─── REDDIT ─────────────────────────────────────────────────
      - name: Download Reddit APK
        if: needs.check-versions.outputs.reddit_version != ''
        id: dl_reddit
        run: |
          VERSION="${{ needs.check-versions.outputs.reddit_version }}"
          echo "Downloading Reddit ${VERSION} from Uptodown..."
          python scripts/download_uptodown.py "reddit" "$VERSION"
          if [ ! -f "com.reddit.frontpage.apk" ]; then
            echo "❌ Reddit APK download failed!"
            exit 1
          fi
          REAL_VERSION=$(aapt dump badging "com.reddit.frontpage.apk" \
            | grep "versionName" | sed -e "s/.*versionName='//" -e "s/'.*//")
          echo "reddit_real_version=$REAL_VERSION" >> $GITHUB_OUTPUT
          echo "✅ Reddit APK downloaded (real version: $REAL_VERSION)."

      - name: Patch Reddit
        if: needs.check-versions.outputs.reddit_version != ''
        id: patch_reddit
        run: |
          APK_FILE="com.reddit.frontpage.apk"
          CLI_JAR=$(find . -name "revanced-cli-*.jar" | head -n 1)
          PATCHES_RVP=$(find . -name "patches-*.rvp"  | head -n 1)
          REAL_VERSION="${{ steps.dl_reddit.outputs.reddit_real_version }}"
          TODAY="${{ steps.date.outputs.today }}"
          OUTPUT="reddit-revanced-v${REAL_VERSION}-${TODAY}.apk"

          echo "Patching Reddit $REAL_VERSION → $OUTPUT"
          # List all available Reddit patches first so we can see what's supported
          java -jar "$CLI_JAR" list-patches -p "$PATCHES_RVP" -f com.reddit.frontpage || true

          java -jar "$CLI_JAR" patch \
            --keystore="revanced.keystore" \
            --exclusive \
            -p "$PATCHES_RVP" \
            -e "Spoof client" \
            -e "Premium icon" \
            -e "Hide ads" \
            -e "Sanitize sharing links" \
            -e "Open links externally" \
            -e "GmsCore support" \
            -o "$OUTPUT" \
            "$APK_FILE"
          echo "reddit_output=$OUTPUT" >> $GITHUB_OUTPUT

      # ─── UPLOAD ARTIFACTS (for 90-day retention backup) ─────────
      - name: Upload YouTube artifact
        if: needs.check-versions.outputs.youtube_version != ''
        uses: actions/upload-artifact@v4
        with:
          name: "youtube-revanced-v${{ needs.check-versions.outputs.youtube_version }}-${{ steps.date.outputs.today }}"
          path: "youtube-revanced-v${{ needs.check-versions.outputs.youtube_version }}-${{ steps.date.outputs.today }}.apk"
          retention-days: 90

      - name: Upload Google Photos artifact
        if: needs.check-versions.outputs.photos_version != ''
        uses: actions/upload-artifact@v4
        with:
          name: "google-photos-revanced-v${{ steps.dl_photos.outputs.photos_real_version }}-${{ steps.date.outputs.today }}"
          path: "google-photos-revanced-v${{ steps.dl_photos.outputs.photos_real_version }}-${{ steps.date.outputs.today }}.apk"
          retention-days: 90

      - name: Upload Reddit artifact
        if: needs.check-versions.outputs.reddit_version != ''
        uses: actions/upload-artifact@v4
        with:
          name: "reddit-revanced-v${{ steps.dl_reddit.outputs.reddit_real_version }}-${{ steps.date.outputs.today }}"
          path: "reddit-revanced-v${{ steps.dl_reddit.outputs.reddit_real_version }}-${{ steps.date.outputs.today }}.apk"
          retention-days: 90

      # ─── RELEASE MANAGEMENT ─────────────────────────────────────
      - name: Delete old consolidated releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --json tagName -q ".[].tagName" \
            | grep "^revanced-apps-v" \
            | while read -r tag; do
                echo "Deleting old release: $tag"
                gh release delete "$tag" -y --cleanup-tag || true
              done

      - name: Build release body
        id: release_body
        run: |
          TODAY="${{ steps.date.outputs.today }}"
          YT_VER="${{ needs.check-versions.outputs.youtube_version }}"
          PHOTOS_VER="${{ steps.dl_photos.outputs.photos_real_version }}"
          REDDIT_VER="${{ steps.dl_reddit.outputs.reddit_real_version }}"
          PATCHES_TAG="${{ needs.check-versions.outputs.patches_tag }}"
          CLI_TAG="${{ needs.check-versions.outputs.cli_tag }}"

          cat <<EOF > release_body.md
          ## 📦 ReVanced Apps — Automated Build

          Automatically built whenever a new supported version is detected.
          All apps are signed with a unified secure keystore.

          | App | Patched Version |
          |-----|----------------|
          | 📺 YouTube ReVanced | \`${YT_VER:-N/A}\` |
          | 📸 Google Photos ReVanced | \`${PHOTOS_VER:-N/A}\` |
          | 🔴 Reddit ReVanced | \`${REDDIT_VER:-N/A}\` |

          **ReVanced Patches:** \`${PATCHES_TAG}\`
          **ReVanced CLI:** \`${CLI_TAG}\`
          **Build Date:** \`${TODAY}\`

          ---
          ### 📥 Installation Notes
          - Install [ReVanced GmsCore](https://github.com/ReVanced/GmsCore/releases/latest) before launching any of these apps.
          - If you have a previous version installed, uninstall it first or sign both with the same keystore.
          EOF

          echo "release_body_file=release_body.md" >> $GITHUB_OUTPUT

      - name: Create combined release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "revanced-apps-v${{ steps.date.outputs.today }}"
          name: "ReVanced Apps — ${{ steps.date.outputs.today }}"
          body_path: release_body.md
          files: |
            youtube-revanced-v${{ needs.check-versions.outputs.youtube_version }}-${{ steps.date.outputs.today }}.apk
            google-photos-revanced-v${{ steps.dl_photos.outputs.photos_real_version }}-${{ steps.date.outputs.today }}.apk
            reddit-revanced-v${{ steps.dl_reddit.outputs.reddit_real_version }}-${{ steps.date.outputs.today }}.apk
          draft: false
          prerelease: false

      # ─── COMMIT STATE + README ───────────────────────────────────
      - name: Commit updated state file and README
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update ReVanced built versions state [skip ci]"
          branch: master
          file_pattern: "README.md .github/last_built_versions.json"
