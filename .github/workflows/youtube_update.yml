            "$ARM64_APK" \
            "$ARM7_APK"

      - name: Delete old YouTube releases
        if: steps.check.outputs.youtube_version != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY="${{ steps.date.outputs.today }}"
          echo "Cleaning up old YouTube releases (keeping today: $TODAY)..."

          gh release list --repo "$GITHUB_REPOSITORY" --limit 50 --json tagName,name \
            | jq -r '.[] | select(.tagName | startswith("youtube-revanced")) | select(.tagName | contains("'"$TODAY"'") | not) | .tagName' \
            | while read TAG; do
                echo "Deleting release: $TAG"
                gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --yes 2>/dev/null || true
                git push origin --delete "$TAG" 2>/dev/null || true
              done
