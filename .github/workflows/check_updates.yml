name: Check for ReVanced Updates

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  check-updates:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Install apkeep (manual)
        run: |
          echo "Downloading apkeep (musl)..."
          curl -L -o apkeep https://github.com/EFForg/apkeep/releases/download/0.15.0/apkeep-x86_64-unknown-linux-musl
          chmod +x apkeep
          sudo mv apkeep /usr/local/bin/
          apkeep --version

      - name: Run update script
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_CLEANUP: "true"
        run: python scripts/check_updates.py

      - name: Download Google Photos APK
        if: steps.check.outputs.photos_version != ''
        run: |
          VERSION="${{ steps.check.outputs.photos_version }}"
          echo "Expected version: $VERSION"
          if [ "$VERSION" = "latest" ]; then
            echo "Downloading latest version..."
            apkeep -a com.google.android.apps.photos .
          else
            echo "Downloading version $VERSION..."
            apkeep -a com.google.android.apps.photos@$VERSION .
          fi

      - name: Verify APK Signature
        if: steps.check.outputs.photos_version != ''
        run: |
          echo "Verifying APK signature..."
          APK_FILE=$(find . -name "com.google.android.apps.photos*.apk" | head -n 1)

          # Extract SHA-256 fingerprint
          FINGERPRINT=$(keytool -printcert -jarfile "$APK_FILE" | grep "SHA256:" | head -n 1 | awk '{print $2}')
          echo "APK Fingerprint: $FINGERPRINT"

          # Known Google Photos Release Certificate Fingerprint (SHA-256)
          # Source: Google Inc. (matches Play Store versions)
          EXPECTED_HASH="3D:7A:12:23:01:9A:A3:9D:9E:A0:E3:43:6A:B7:C0:89:6B:FB:4F:B6:79:F4:DE:5F:E7:C2:3F:32:6C:8F:99:4A"

          if [ "$FINGERPRINT" != "$EXPECTED_HASH" ]; then
             echo "ERROR: Signature verification failed!"
             echo "Expected: $EXPECTED_HASH"
             echo "Found:    $FINGERPRINT"
             echo "This APK might be modified or signed with a different key. Aborting."
             exit 1
          fi
          echo "Signature verified! This APK is genuine and signed by Google."

      - name: Patch Google Photos
        if: steps.check.outputs.photos_version != ''
        run: |
          # Find the downloaded APK (apkeep naming might vary)
          APK_FILE=$(find . -name "com.google.android.apps.photos*.apk" | head -n 1)
          if [ -z "$APK_FILE" ]; then
             echo "APK not found!"
             exit 1
          fi

          # Find CLI and Patches (should be left by script if SKIP_CLEANUP is set)
          CLI_JAR=$(find . -name "revanced-cli-*.jar" | head -n 1)
          PATCHES_RVP=$(find . -name "patches-*.rvp" | head -n 1)

          echo "Patching $APK_FILE with $CLI_JAR and $PATCHES_RVP..."

          java -jar "$CLI_JAR" patch \
            --exclusive \
            --keystore "google-photos-revanced.keystore" \
            -p "$PATCHES_RVP" \
            -e "Spoof features" \
            -e "Enable DCIM folders backup control" \
            -e "GmsCore support" \
            -o google-photos-revanced.apk \
            "$APK_FILE"

      - name: Upload Patched APK
        if: steps.check.outputs.photos_version != ''
        uses: actions/upload-artifact@v4
        with:
          name: google-photos-revanced
          path: google-photos-revanced.apk
          retention-days: 90

      - name: Create Release
        if: steps.check.outputs.photos_version != ''
        uses: softprops/action-gh-release@v1
        with:
          tag_name: google-photos-v${{ steps.check.outputs.photos_version }}
          name: Google Photos v${{ steps.check.outputs.photos_version }}
          body: |
            Automated build of Google Photos ReVanced.

            **Version:** ${{ steps.check.outputs.photos_version }}

            *Signed by Google (verified).*
          files: google-photos-revanced.apk
          draft: false
          prerelease: false

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update ReVanced versions [skip ci]"
          branch: master
          file_pattern: "README.md"
