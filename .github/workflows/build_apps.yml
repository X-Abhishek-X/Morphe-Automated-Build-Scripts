name: Build ReVanced Apps (YouTube & Google Photos)

on:
  schedule:
    - cron: "0 1 * * *" # Run daily at 1 AM UTC
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt bs4 requests

      - name: Install clean apkeep from EFForg
        run: |
          wget -qO apkeep https://github.com/EFForg/apkeep/releases/latest/download/apkeep-x86_64-unknown-linux-gnu
          chmod +x apkeep
          sudo mv apkeep /usr/local/bin/

      - name: Run update script (Check versions)
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_CLEANUP: "true"
        run: python scripts/check_updates.py

      - name: Set build date
        id: date
        run: echo "today=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT

      - name: Download YouTube APK
        if: steps.check.outputs.youtube_version != ''
        run: |
          VERSION="${{ steps.check.outputs.youtube_version }}"
          echo "Expected version: $VERSION"
          if [ "$VERSION" = "latest" ]; then
            apkeep -a com.google.android.youtube .
          else
            apkeep -a "com.google.android.youtube@${VERSION}" .
          fi
          DOWNLOAD=$(find . -maxdepth 1 \( -name "com.google.android.youtube*.apk" -o -name "com.google.android.youtube*.xapk" -o -name "com.google.android.youtube*.apks" \) | head -n 1)
          if [ -z "$DOWNLOAD" ]; then echo "YouTube APK not found!"; exit 1; fi
          mv "$DOWNLOAD" "com.google.android.youtube.apk"

      - name: Patch YouTube
        if: steps.check.outputs.youtube_version != ''
        run: |
          APK_FILE="com.google.android.youtube.apk"
          if [ ! -f "$APK_FILE" ]; then
             echo "YouTube APK not found!"
             exit 1
          fi

          # If it contains .apk files inside, it's a split bundle.
          if unzip -l "$APK_FILE" | grep -q '\.apk$'; then
            echo "Split APK bundle detected. Extracting..."
            mv "$APK_FILE" bundle.xapk
            unzip -o bundle.xapk -d extracted_apk
            
            APKEDITOR_URL=$(curl -s https://api.github.com/repos/REAndroid/APKEditor/releases/latest | grep "browser_download_url.*jar" | cut -d '"' -f 4 | head -n 1)
            curl -L -o APKEditor.jar "$APKEDITOR_URL"

            MAIN_APK=$(find extracted_apk -maxdepth 1 -name "base.apk" | head -n 1)
            if [ -z "$MAIN_APK" ]; then
              MAIN_APK=$(find extracted_apk -maxdepth 1 -name "*.apk" ! -name "config.*" | head -n 1)
            fi

            mkdir -p merge_dir
            cp "$MAIN_APK" merge_dir/base.apk
            
            # COPY ONLY ESSENTIAL SPLITS FOR S24 ULTRA (arm64, english, xxhdpi)
            find extracted_apk -maxdepth 1 -name "config.arm64_v8a.apk" -exec cp {} merge_dir/ \;
            find extracted_apk -maxdepth 1 -name "config.en.apk" -exec cp {} merge_dir/ \;
            find extracted_apk -maxdepth 1 -name "config.xxhdpi.apk" -exec cp {} merge_dir/ \;

            java -jar APKEditor.jar m -i merge_dir -o merged.apk -extractNativeLibs true

            if [ ! -f "merged.apk" ]; then
              echo "Error: APKEditor merge failed."; exit 1
            fi
            APK_FILE="merged.apk"
          fi

          CLI_JAR=$(find . -name "revanced-cli-*.jar" | head -n 1)
          PATCHES_RVP=$(find . -name "patches-*.rvp" | head -n 1)

          java -jar "$CLI_JAR" patch \
            --keystore="revanced.keystore" \
            --exclusive \
            -p "$PATCHES_RVP" \
            -e "Bypass URL redirects" \
            -e "Bypass image region restrictions" \
            -e "Change form factor" \
            -e "Check watch history domain name resolution" \
            -e "Copy video URL" \
            -e "Custom player overlay opacity" \
            -e "Disable auto captions" \
            -e "Disable double tap actions" \
            -e "Disable fullscreen ambient mode" \
            -e "Disable haptic feedback" \
            -e "Disable player popup panels" \
            -e "Disable resuming Shorts on startup" \
            -e "Disable rolling number animations" \
            -e "Disable sign in to TV popup" \
            -e "Disable video codecs" \
            -e "Downloads" \
            -e "Exit fullscreen mode" \
            -e "Force original audio" \
            -e "GmsCore support" \
            -e "Hide Shorts components" \
            -e "Hide ads" \
            -e "Hide end screen cards" \
            -e "Hide end screen suggested video" \
            -e "Hide info cards" \
            -e "Hide layout components" \
            -e "Hide player flyout menu items" \
            -e "Hide player overlay buttons" \
            -e "Hide related video overlay" \
            -e "Hide timestamp" \
            -e "Hide video action buttons" \
            -e "Loop video" \
            -e "Miniplayer" \
            -e "Navigation buttons" \
            -e "Open Shorts in regular player" \
            -e "Open links externally" \
            -e "Open videos fullscreen" \
            -e "Playback speed" \
            -e "Remove background playback restrictions" \
            -e "Remove viewer discretion dialog" \
            -e "Return YouTube Dislike" \
            -e "Sanitize sharing links" \
            -e "Seekbar" \
            -e "Shorts autoplay" \
            -e "SponsorBlock" \
            -e "Spoof app version" \
            -e "Spoof device dimensions" \
            -e "Spoof video streams" \
            -e "Swipe controls" \
            -e "Theme" \
            -e "Video ads" \
            -e "Video quality" \
            -e "Wide search bar" \
            -o "youtube-revanced-v${{ steps.check.outputs.youtube_version }}-${{ steps.date.outputs.today }}.apk" \
            "$APK_FILE"

      # --- GOOGLE PHOTOS BUILD SECTION ---
      - name: Download Google Photos APK
        if: steps.check.outputs.photos_version != ''
        id: download_photos
        run: |
          sudo apt-get update && sudo apt-get install -y aapt
          VERSION="${{ steps.check.outputs.photos_version }}"
          echo "Expected version: $VERSION"
          if [ "$VERSION" = "latest" ]; then
            apkeep -a com.google.android.apps.photos .
          else
            apkeep -a "com.google.android.apps.photos@${VERSION}" .
          fi
          DOWNLOAD=$(find . -maxdepth 1 \( -name "com.google.android.apps.photos*.apk" -o -name "com.google.android.apps.photos*.xapk" -o -name "com.google.android.apps.photos*.apks" \) | head -n 1)
          if [ -z "$DOWNLOAD" ]; then echo "Photos APK not found!"; exit 1; fi
          mv "$DOWNLOAD" "com.google.android.apps.photos.apk"

      - name: Patch Google Photos
        if: steps.check.outputs.photos_version != ''
        run: |
          APK_FILE="com.google.android.apps.photos.apk"
          if [ ! -f "$APK_FILE" ]; then
             echo "Photos APK not found!"
             exit 1
          fi

          # If it contains .apk files inside, it's a split bundle.
          if unzip -l "$APK_FILE" | grep -q '\.apk$'; then
            echo "Split APK bundle detected. Extracting..."
            mv "$APK_FILE" bundle.xapk
            unzip -o bundle.xapk -d extracted_photos
            
            if [ ! -f "APKEditor.jar" ]; then
              APKEDITOR_URL=$(curl -s https://api.github.com/repos/REAndroid/APKEditor/releases/latest | grep "browser_download_url.*jar" | cut -d '"' -f 4 | head -n 1)
              curl -L -o APKEditor.jar "$APKEDITOR_URL"
            fi

            MAIN_APK=$(find extracted_photos -maxdepth 1 -name "base.apk" | head -n 1)
            if [ -z "$MAIN_APK" ]; then
              MAIN_APK=$(find extracted_photos -maxdepth 1 -name "*.apk" ! -name "config.*" | head -n 1)
            fi

            mkdir -p merge_photos
            cp "$MAIN_APK" merge_photos/base.apk
            
            # COPY ONLY ESSENTIAL SPLITS FOR S24 ULTRA (arm64, english, xxhdpi)
            find extracted_photos -maxdepth 1 -name "config.arm64_v8a.apk" -exec cp {} merge_photos/ \;
            find extracted_photos -maxdepth 1 -name "config.en.apk" -exec cp {} merge_photos/ \;
            find extracted_photos -maxdepth 1 -name "config.xxhdpi.apk" -exec cp {} merge_photos/ \;

            java -jar APKEditor.jar m -i merge_photos -o photos_merged.apk -extractNativeLibs true

            if [ ! -f "photos_merged.apk" ]; then
              echo "Error: APKEditor merge failed."; exit 1
            fi
            APK_FILE="photos_merged.apk"
          fi

          REAL_VERSION=$(aapt dump badging "$APK_FILE" | grep "versionName" | sed -e "s/.*versionName='//" -e "s/'.*//")
          echo "photos_real_version=$REAL_VERSION" >> $GITHUB_OUTPUT

          CLI_JAR=$(find . -name "revanced-cli-*.jar" | head -n 1)
          PATCHES_RVP=$(find . -name "patches-*.rvp" | head -n 1)

          java -jar "$CLI_JAR" patch \
            --keystore="revanced.keystore" \
            --exclusive \
            -p "$PATCHES_RVP" \
            -e "Spoof features" \
            -e "Enable DCIM folders backup control" \
            -e "GmsCore support" \
            -e "Change package name" \
            -o "google-photos-revanced-v${{ steps.download_photos.outputs.photos_real_version }}-${{ steps.date.outputs.today }}.apk" \
            "$APK_FILE"

      # --- UPLOAD ARTIFACTS ---
      - name: Upload YouTube ReVanced Artifact
        if: steps.check.outputs.youtube_version != ''
        uses: actions/upload-artifact@v4
        with:
          name: "youtube-revanced-v${{ steps.check.outputs.youtube_version }}-${{ steps.date.outputs.today }}"
          path: "youtube-revanced-v${{ steps.check.outputs.youtube_version }}-${{ steps.date.outputs.today }}.apk"
          retention-days: 90

      - name: Upload Google Photos ReVanced Artifact
        if: steps.check.outputs.photos_version != ''
        uses: actions/upload-artifact@v4
        with:
          name: "google-photos-revanced-v${{ steps.download_photos.outputs.photos_real_version }}-${{ steps.date.outputs.today }}"
          path: "google-photos-revanced-v${{ steps.download_photos.outputs.photos_real_version }}-${{ steps.date.outputs.today }}.apk"
          retention-days: 90

      # --- CONSOLIDATE RELEASES ---
      - name: Delete Old Consolidated Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --json tagName -q ".[].tagName" | grep "^revanced-apps-v" | while read -r tag; do
            echo "Deleting old composite release: $tag"
            gh release delete "$tag" -y --cleanup-tag || true
          done

      - name: Create Combined Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "revanced-apps-v${{ steps.date.outputs.today }}"
          name: "ReVanced Apps (YouTube & Google Photos) - ${{ steps.date.outputs.today }}"
          body: |
            Automated bundled build of YouTube ReVanced and Google Photos ReVanced.

            **YouTube App Version:** ${{ steps.check.outputs.youtube_version }}
            **Google Photos App Version:** ${{ steps.download_photos.outputs.photos_real_version }}

            **Build Date:** ${{ steps.date.outputs.today }}

            _Both apps were automatically signed with a unified secure Keystore and generated flawlessly direct from source code._
          files: |
            youtube-revanced-v${{ steps.check.outputs.youtube_version }}-${{ steps.date.outputs.today }}.apk
            google-photos-revanced-v${{ steps.download_photos.outputs.photos_real_version }}-${{ steps.date.outputs.today }}.apk
          draft: false
          prerelease: false
          overwrite: true

      - name: Commit and Push README changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update ReVanced versions [skip ci]"
          branch: master
          file_pattern: "README.md"
