name: Check for ReVanced Updates

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  check-updates:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Install apkeep (via eget)
        env:
          EGET_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p $HOME/.local/bin
          curl https://zyedidia.github.io/eget.sh | sh
          ./eget EFForg/apkeep --asset apkeep-x86_64-unknown-linux-gnu --to /usr/local/bin/apkeep
          apkeep --version

      - name: Run update script
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_CLEANUP: "true"
        run: python scripts/check_updates.py

      - name: Download Google Photos APK
        if: steps.check.outputs.photos_version != ''
        run: |
          VERSION="${{ steps.check.outputs.photos_version }}"
          echo "Expected version: $VERSION"
          if [ "$VERSION" = "latest" ]; then
            echo "Downloading latest version..."
            apkeep -a com.google.android.apps.photos .
          else
            echo "Downloading version $VERSION..."
            apkeep -a com.google.android.apps.photos -v "$VERSION" .
          fi

      - name: Verify APK Signature
        if: steps.check.outputs.photos_version != ''
        run: |
          echo "Verifying APK signature..."
          APK_FILE=$(find . -name "com.google.android.apps.photos*.apk" | head -n 1)

          # Extract SHA-256 fingerprint
          FINGERPRINT=$(keytool -printcert -jarfile "$APK_FILE" | grep "SHA256:" | head -n 1 | awk '{print $2}')
          echo "APK Fingerprint: $FINGERPRINT"

          # Known Google Photos Release Certificate Fingerprint (SHA-256)
          # Source: Google Inc. (matches Play Store versions)
          EXPECTED_HASH="3D:7A:12:23:01:9A:A3:9D:9E:A0:E3:43:6A:B7:C0:89:6B:FB:4F:B6:79:F4:DE:5F:E7:C2:3F:32:6C:8F:99:4A"

          if [ "$FINGERPRINT" != "$EXPECTED_HASH" ]; then
             echo "ERROR: Signature verification failed!"
             echo "Expected: $EXPECTED_HASH"
             echo "Found:    $FINGERPRINT"
             echo "This APK might be modified or signed with a different key. Aborting."
             exit 1
          fi
          echo "Signature verified! This APK is genuine and signed by Google."

      - name: Patch Google Photos
        if: steps.check.outputs.photos_version != ''
        run: |
          # Find the downloaded APK (apkeep naming might vary)
          APK_FILE=$(find . -name "com.google.android.apps.photos*.apk" | head -n 1)
          if [ -z "$APK_FILE" ]; then
             echo "APK not found!"
             exit 1
          fi

          # Find CLI and Patches (should be left by script if SKIP_CLEANUP is set)
          CLI_JAR=$(find . -name "revanced-cli-*.jar" | head -n 1)
          PATCHES_RVP=$(find . -name "patches-*.rvp" | head -n 1)

          echo "Patching $APK_FILE with $CLI_JAR and $PATCHES_RVP..."

          java -jar "$CLI_JAR" patch \
            --exclusive \
            --keystore "google-photos-revanced.keystore" \
            -p "$PATCHES_RVP" \
            -e "Spoof features" \
            -e "Enable DCIM folders backup control" \
            -e "GmsCore support" \
            -o google-photos-revanced.apk \
            "$APK_FILE"

      - name: Download YouTube APK
        if: steps.check.outputs.youtube_version != ''
        run: |
          VERSION="${{ steps.check.outputs.youtube_version }}"
          echo "Expected version: $VERSION"
          if [ "$VERSION" = "latest" ]; then
            echo "Downloading latest version..."
            apkeep -a com.google.android.youtube .
          else
            echo "Downloading version $VERSION..."
            apkeep -a com.google.android.youtube -v "$VERSION" .
          fi

      - name: Patch YouTube
        if: steps.check.outputs.youtube_version != ''
        run: |
          # Find the downloaded APK
          APK_FILE=$(find . -name "com.google.android.youtube*.apk" | head -n 1)
          if [ -z "$APK_FILE" ]; then
             echo "APK not found!"
             exit 1
          fi

          CLI_JAR=$(find . -name "revanced-cli-*.jar" | head -n 1)
          PATCHES_RVP=$(find . -name "patches-*.rvp" | head -n 1)

          echo "Patching $APK_FILE..."
          
          java -jar "$CLI_JAR" patch \
            --exclusive \
            --keystore "google-photos-revanced.keystore" \
            -p "$PATCHES_RVP" \
            -i "Bypass URL redirects" \
            -i "Bypass image region restrictions" \
            -i "Change form factor" \
            -i "Check watch history domain name resolution" \
            -i "Copy video URL" \
            -i "Custom player overlay opacity" \
            -i "Disable auto captions" \
            -i "Disable double tap actions" \
            -i "Disable fullscreen ambient mode" \
            -i "Disable haptic feedback" \
            -i "Disable player popup panels" \
            -i "Disable resuming Shorts on startup" \
            -i "Disable rolling number animations" \
            -i "Disable sign in to TV popup" \
            -i "Disable video codecs" \
            -i "Downloads" \
            -i "Exit fullscreen mode" \
            -i "Force original audio" \
            -i "GmsCore support" \
            -i "Hide Shorts components" \
            -i "Hide ads" \
            -i "Hide end screen cards" \
            -i "Hide end screen suggested video" \
            -i "Hide info cards" \
            -i "Hide layout components" \
            -i "Hide player flyout menu items" \
            -i "Hide player overlay buttons" \
            -i "Hide related video overlay" \
            -i "Hide timestamp" \
            -i "Hide video action buttons" \
            -i "Loop video" \
            -i "Miniplayer" \
            -i "Navigation buttons" \
            -i "Open Shorts in regular player" \
            -i "Open links externally" \
            -i "Open videos fullscreen" \
            -i "Playback speed" \
            -i "Remove background playback restrictions" \
            -i "Remove viewer discretion dialog" \
            -i "Return YouTube Dislike" \
            -i "Sanitize sharing links" \
            -i "Seekbar" \
            -i "Shorts autoplay" \
            -i "SponsorBlock" \
            -i "Spoof app version" \
            -i "Spoof device dimensions" \
            -i "Spoof video streams" \
            -i "Swipe controls" \
            -i "Theme" \
            -i "Video ads" \
            -i "Video quality" \
            -i "Wide search bar" \
            -o youtube-revanced.apk \
            "$APK_FILE"

      - name: Upload Patched APKs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: patched-apks
          path: |
            google-photos-revanced.apk
            youtube-revanced.apk
          retention-days: 90

      - name: Create Release
        if: steps.check.outputs.photos_version != '' || steps.check.outputs.youtube_version != ''
        uses: softprops/action-gh-release@v1
        with:
          tag_name: revanced-${{ github.run_number }}
          name: ReVanced Update ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          body: |
            Automated build of ReVanced APKs.
            
            **Google Photos Version:** ${{ steps.check.outputs.photos_version }}
            **YouTube Version:** ${{ steps.check.outputs.youtube_version }}
            
            *Signed by Google (Photos only verified currently).*
          files: *-revanced.apk
          draft: false
          prerelease: false

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update ReVanced versions [skip ci]"
          branch: master
          file_pattern: "README.md *.bat *.ps1"
