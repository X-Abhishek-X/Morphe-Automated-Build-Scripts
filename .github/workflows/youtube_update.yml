name: Check for ReVanced Updates (YouTube)

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  check-youtube:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Install apkeep
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/install_apkeep.py
          chmod +x apkeep
          sudo mv apkeep /usr/local/bin/
          apkeep --version

      - name: Run update script (Check versions)
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_CLEANUP: "true"
        run: python scripts/check_updates.py

      - name: Set build metadata
        id: date
        run: |
          echo "today=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT
          CLI_JAR=$(find . -name "revanced-cli-*.jar" | head -n 1)
          PATCHES_RVP=$(find . -name "patches-*.rvp" | head -n 1)
          echo "cli_version=$(basename "$CLI_JAR" .jar | grep -oP '\d+\.\d+\.\d+')" >> $GITHUB_OUTPUT
          echo "patches_version=$(basename "$PATCHES_RVP" .rvp | grep -oP '\d+\.\d+\.\d+')" >> $GITHUB_OUTPUT

      - name: Download YouTube APK
        if: steps.check.outputs.youtube_version != ''
        run: |
          VERSION="${{ steps.check.outputs.youtube_version }}"
          echo "Downloading YouTube $VERSION..."
          if [ "$VERSION" = "latest" ]; then
            apkeep -a com.google.android.youtube .
          else
            apkeep -a "com.google.android.youtube@${VERSION}" .
          fi
          echo "Files after download:"; ls -la

      - name: Prepare ARM64 and ARMv7 APKs
        if: steps.check.outputs.youtube_version != ''
        run: |
          DOWNLOAD=$(find . -maxdepth 1 \( -name "com.google.android.youtube*.apk" -o -name "com.google.android.youtube*.xapk" -o -name "com.google.android.youtube*.apks" \) | head -n 1)

          if [ -z "$DOWNLOAD" ]; then
            echo "ERROR: No YouTube file found after download!"
            ls -la; exit 1
          fi

          echo "Found: $DOWNLOAD"

          # Download latest APKEditor
          APKEDITOR_URL=$(curl -s https://api.github.com/repos/REAndroid/APKEditor/releases/latest | grep "browser_download_url.*jar" | cut -d '"' -f 4 | head -n 1)
          echo "Downloading APKEditor from: $APKEDITOR_URL"
          curl -L -o APKEditor.jar "$APKEDITOR_URL"

          if [[ "$DOWNLOAD" == *.xapk ]] || [[ "$DOWNLOAD" == *.apks ]]; then
            echo "Split APK detected. Extracting..."
            unzip -o "$DOWNLOAD" -d extracted_apk
            echo "Extracted contents:"; ls extracted_apk/

            # --- ARM64-v8a (nodpi): base + arm64 ABI split only ---
            mkdir -p merge_arm64
            cp extracted_apk/base.apk merge_arm64/
            find extracted_apk -name "*arm64*" | while read f; do cp "$f" merge_arm64/; done
            echo "ARM64 merge dir:"; ls merge_arm64/
            java -jar APKEditor.jar m -i merge_arm64 -o merged-arm64.apk
            echo "ARM64 merged: $(du -sh merged-arm64.apk)"

            # --- ARMv7 (nodpi): base + armeabi-v7a ABI split only ---
            mkdir -p merge_arm7
            cp extracted_apk/base.apk merge_arm7/
            find extracted_apk \( -name "*armeabi_v7a*" -o -name "*armeabi-v7a*" \) | while read f; do cp "$f" merge_arm7/; done
            echo "ARMv7 merge dir:"; ls merge_arm7/
            java -jar APKEditor.jar m -i merge_arm7 -o merged-arm7.apk
            echo "ARMv7 merged: $(du -sh merged-arm7.apk)"

          else
            echo "Single APK detected (no ABI splits available). Using as-is for both."
            cp "$DOWNLOAD" merged-arm64.apk
            cp "$DOWNLOAD" merged-arm7.apk
          fi

          [ -f "merged-arm64.apk" ] || { echo "ERROR: merged-arm64.apk missing!"; exit 1; }
          [ -f "merged-arm7.apk" ]  || { echo "ERROR: merged-arm7.apk missing!"; exit 1; }

      - name: Patch YouTube (ARM64-v8a)
        if: steps.check.outputs.youtube_version != ''
        run: |
          CLI_JAR=$(find . -name "revanced-cli-*.jar" | head -n 1)
          PATCHES_RVP=$(find . -name "patches-*.rvp" | head -n 1)
          VERSION="${{ steps.check.outputs.youtube_version }}"
          TODAY="${{ steps.date.outputs.today }}"

          echo "Patching ARM64-v8a..."
          java -jar "$CLI_JAR" patch \
            --exclusive \
            -p "$PATCHES_RVP" \
            -e "Bypass URL redirects" \
            -e "Bypass image region restrictions" \
            -e "Change form factor" \
            -e "Check watch history domain name resolution" \
            -e "Copy video URL" \
            -e "Custom player overlay opacity" \
            -e "Disable auto captions" \
            -e "Disable double tap actions" \
            -e "Disable fullscreen ambient mode" \
            -e "Disable haptic feedback" \
            -e "Disable player popup panels" \
            -e "Disable resuming Shorts on startup" \
            -e "Disable rolling number animations" \
            -e "Disable sign in to TV popup" \
            -e "Disable video codecs" \
            -e "Downloads" \
            -e "Exit fullscreen mode" \
            -e "Force original audio" \
            -e "GmsCore support" \
            -e "Hide Shorts components" \
            -e "Hide ads" \
            -e "Hide end screen cards" \
            -e "Hide end screen suggested video" \
            -e "Hide info cards" \
            -e "Hide layout components" \
            -e "Hide player flyout menu items" \
            -e "Hide player overlay buttons" \
            -e "Hide related video overlay" \
            -e "Hide timestamp" \
            -e "Hide video action buttons" \
            -e "Loop video" \
            -e "Miniplayer" \
            -e "Navigation buttons" \
            -e "Open Shorts in regular player" \
            -e "Open links externally" \
            -e "Open videos fullscreen" \
            -e "Playback speed" \
            -e "Remove background playback restrictions" \
            -e "Remove viewer discretion dialog" \
            -e "Return YouTube Dislike" \
            -e "Sanitize sharing links" \
            -e "Seekbar" \
            -e "Shorts autoplay" \
            -e "SponsorBlock" \
            -e "Spoof app version" \
            -e "Spoof device dimensions" \
            -e "Spoof video streams" \
            -e "Swipe controls" \
            -e "Theme" \
            -e "Video ads" \
            -e "Video quality" \
            -e "Wide search bar" \
            -o "youtube-revanced-v${VERSION}-arm64-v8a-nodpi-${TODAY}.apk" \
            merged-arm64.apk

      - name: Patch YouTube (ARMv7)
        if: steps.check.outputs.youtube_version != ''
        run: |
          CLI_JAR=$(find . -name "revanced-cli-*.jar" | head -n 1)
          PATCHES_RVP=$(find . -name "patches-*.rvp" | head -n 1)
          VERSION="${{ steps.check.outputs.youtube_version }}"
          TODAY="${{ steps.date.outputs.today }}"

          echo "Patching ARMv7..."
          java -jar "$CLI_JAR" patch \
            --exclusive \
            -p "$PATCHES_RVP" \
            -e "Bypass URL redirects" \
            -e "Bypass image region restrictions" \
            -e "Change form factor" \
            -e "Check watch history domain name resolution" \
            -e "Copy video URL" \
            -e "Custom player overlay opacity" \
            -e "Disable auto captions" \
            -e "Disable double tap actions" \
            -e "Disable fullscreen ambient mode" \
            -e "Disable haptic feedback" \
            -e "Disable player popup panels" \
            -e "Disable resuming Shorts on startup" \
            -e "Disable rolling number animations" \
            -e "Disable sign in to TV popup" \
            -e "Disable video codecs" \
            -e "Downloads" \
            -e "Exit fullscreen mode" \
            -e "Force original audio" \
            -e "GmsCore support" \
            -e "Hide Shorts components" \
            -e "Hide ads" \
            -e "Hide end screen cards" \
            -e "Hide end screen suggested video" \
            -e "Hide info cards" \
            -e "Hide layout components" \
            -e "Hide player flyout menu items" \
            -e "Hide player overlay buttons" \
            -e "Hide related video overlay" \
            -e "Hide timestamp" \
            -e "Hide video action buttons" \
            -e "Loop video" \
            -e "Miniplayer" \
            -e "Navigation buttons" \
            -e "Open Shorts in regular player" \
            -e "Open links externally" \
            -e "Open videos fullscreen" \
            -e "Playback speed" \
            -e "Remove background playback restrictions" \
            -e "Remove viewer discretion dialog" \
            -e "Return YouTube Dislike" \
            -e "Sanitize sharing links" \
            -e "Seekbar" \
            -e "Shorts autoplay" \
            -e "SponsorBlock" \
            -e "Spoof app version" \
            -e "Spoof device dimensions" \
            -e "Spoof video streams" \
            -e "Swipe controls" \
            -e "Theme" \
            -e "Video ads" \
            -e "Video quality" \
            -e "Wide search bar" \
            -o "youtube-revanced-v${VERSION}-armeabi-v7a-nodpi-${TODAY}.apk" \
            merged-arm7.apk

      - name: Upload Artifacts
        if: steps.check.outputs.youtube_version != ''
        uses: actions/upload-artifact@v4
        with:
          name: "youtube-revanced-v${{ steps.check.outputs.youtube_version }}-${{ steps.date.outputs.today }}"
          path: |
            youtube-revanced-v${{ steps.check.outputs.youtube_version }}-arm64-v8a-nodpi-${{ steps.date.outputs.today }}.apk
            youtube-revanced-v${{ steps.check.outputs.youtube_version }}-armeabi-v7a-nodpi-${{ steps.date.outputs.today }}.apk
          retention-days: 90

      - name: Create Release
        if: steps.check.outputs.youtube_version != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.check.outputs.youtube_version }}"
          TODAY="${{ steps.date.outputs.today }}"
          CLI_VER="${{ steps.date.outputs.cli_version }}"
          PATCHES_VER="${{ steps.date.outputs.patches_version }}"

          ARM64_APK="youtube-revanced-v${VERSION}-arm64-v8a-nodpi-${TODAY}.apk"
          ARM7_APK="youtube-revanced-v${VERSION}-armeabi-v7a-nodpi-${TODAY}.apk"

          gh release create "youtube-revanced-v${VERSION}-${TODAY}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "YouTube ReVanced v${VERSION} (${TODAY})" \
            --notes "## 📹 YouTube ReVanced v${VERSION}

**Build Date:** ${TODAY}
**ReVanced CLI:** v${CLI_VER}
**ReVanced Patches:** v${PATCHES_VER}

---

## 📦 Downloads

| File | Architecture |
|------|-------------|
| \`${ARM64_APK}\` | ARM64-v8a (64-bit) — Most modern devices |
| \`${ARM7_APK}\` | ARMv7 (32-bit) — Older devices |

> Both builds are **nodpi** (no density-specific resources stripped).

