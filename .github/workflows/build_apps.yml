name: Build Morphe + De-ReVanced Apps (37 apps)

on:
  schedule:
    - cron: "0 6 */2 * *"   # Every 2 days at 06:00 UTC
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Detect which apps have a new supported version
  # ─────────────────────────────────────────────────────────────
  check-versions:
    name: "🔍 Check for new supported versions"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      any_needs_build:  ${{ steps.check.outputs.any_needs_build }}
      apps_to_build:    ${{ steps.check.outputs.apps_to_build }}
      morphe_tag:       ${{ steps.check.outputs.morphe_tag }}
      de_revanced_tag:  ${{ steps.check.outputs.de_revanced_tag }}
      cli_tag:          ${{ steps.check.outputs.cli_tag }}
      morphe_mpp:       ${{ steps.check.outputs.morphe_mpp }}
      de_revanced_mpp:  ${{ steps.check.outputs.de_revanced_mpp }}
      cli_jar:          ${{ steps.check.outputs.cli_jar }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.x" }
      - uses: actions/setup-java@v4
        with: { distribution: "zulu", java-version: "17" }

      - name: Install dependencies
        run: pip install -q requests beautifulsoup4

      - name: Run version check
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_CLEANUP: "true"
        run: python scripts/check_updates.py

      - name: Apps queued for rebuild
        run: |
          echo '${{ steps.check.outputs.apps_to_build }}' \
            | python3 -c "import json,sys; apps=json.load(sys.stdin); \
              [print(f\"  {a['key']:20} {a['version']}\") for a in apps] if apps \
              else print('  Nothing changed.')"

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Build only changed apps and publish one release
  # ─────────────────────────────────────────────────────────────
  build-and-release:
    name: "🔨 Build & Release"
    needs: check-versions
    if: needs.check-versions.outputs.any_needs_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.x" }
      - uses: actions/setup-java@v4
        with: { distribution: "zulu", java-version: "17" }

      - name: Install dependencies
        run: |
          pip install -q requests beautifulsoup4
          sudo apt-get install -y -q aapt

      - name: Download Morphe CLI & both patch bundles
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_CLEANUP: "true"
        run: python scripts/check_updates.py

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > morphe.keystore

      - name: Set build date
        id: date
        run: echo "today=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT

      - name: Build all changed apps
        id: build
        env:
          APPS_JSON: ${{ needs.check-versions.outputs.apps_to_build }}
          CLI_JAR:   ${{ needs.check-versions.outputs.cli_jar }}
          MORPHE_MPP:   ${{ needs.check-versions.outputs.morphe_mpp }}
          DE_REVANCED_MPP: ${{ needs.check-versions.outputs.de_revanced_mpp }}
          TODAY: ${{ steps.date.outputs.today }}
        run: |
          mkdir -p dist
          CLI=$(find . -name "$CLI_JAR" | head -1)
          MMPP=$(find . -name "$MORPHE_MPP" | head -1)
          DMPP=$(find . -name "$DE_REVANCED_MPP" | head -1)

          echo "$APPS_JSON" | python3 -c "
          import json, sys
          apps = json.load(sys.stdin)
          for a in apps:
              print(a['key'], a['package'], a['slug'], a['version'], a['source'])
          " | while read KEY PKG SLUG VER SOURCE; do
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  Building: $KEY  v$VER"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            # Download APK
            APK_FILE="${PKG}.apk"
            python scripts/download_uptodown.py "$SLUG" "$VER" || {
              echo "  ⚠️  Download failed for $KEY — skipping"
              continue
            }
            [ -f "$APK_FILE" ] || { echo "  ⚠️  APK file missing — skipping"; continue; }

            # Use both patch bundles
            OUT="dist/${KEY}-morphe-v${VER}-${TODAY}.apk"
            java -jar "$CLI" patch \
              --keystore=morphe.keystore \
              -p "$MMPP" \
              -p "$DMPP" \
              -o "$OUT" \
              "$APK_FILE" \
              && echo "  ✅ $OUT" \
              || echo "  ❌ Patch failed for $KEY"

            rm -f "$APK_FILE"
          done

          # List what was built
          echo ""
          echo "Built APKs:"
          ls -lh dist/ 2>/dev/null || echo "  None"

      - name: Upload all APKs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: "morphe-apps-${{ steps.date.outputs.today }}"
          path: dist/*.apk
          if-no-files-found: warn
          retention-days: 90

      - name: Build release notes
        env:
          APPS_JSON: ${{ needs.check-versions.outputs.apps_to_build }}
          MORPHE_TAG:     ${{ needs.check-versions.outputs.morphe_tag }}
          DRVR_TAG:       ${{ needs.check-versions.outputs.de_revanced_tag }}
          CLI_TAG:        ${{ needs.check-versions.outputs.cli_tag }}
          TODAY:          ${{ steps.date.outputs.today }}
        run: |
          {
            echo "## Morphe + De-ReVanced Apps — Automated Build"
            echo ""
            echo "Only apps with new supported versions are rebuilt each run."
            echo ""
            echo "| App | Version |"
            echo "|-----|---------|"
            echo "$APPS_JSON" | python3 -c "
          import json,sys
          apps=json.load(sys.stdin)
          for a in apps:
              print(f\"| {a['key'].replace('_','-')} | \`{a['version']}\` |\")
          "
            echo ""
            echo "**Morphe patches:** \`${MORPHE_TAG}\` · **De-ReVanced:** \`${DRVR_TAG}\` · **CLI:** \`${CLI_TAG}\`"
            echo "**Build date:** \`${TODAY}\`"
            echo ""
            echo "---"
            echo "### Install notes"
            echo "- YouTube / YouTube Music: install [ReVanced GmsCore](https://github.com/ReVanced/GmsCore/releases/latest) first"
            echo "- All other apps: standalone install, no extra app needed"
          } > release_body.md

      - name: Delete previous release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --json tagName -q ".[].tagName" \
            | grep "^morphe-apps-v" \
            | while read -r tag; do
                gh release delete "$tag" -y --cleanup-tag || true
              done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "morphe-apps-v${{ steps.date.outputs.today }}"
          name: "Morphe Apps — ${{ steps.date.outputs.today }}"
          body_path: release_body.md
          files: dist/*.apk
          draft: false
          prerelease: false

      - name: Save updated state
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update built versions state [skip ci]"
          branch: master
          file_pattern: ".github/last_built_versions.json"
